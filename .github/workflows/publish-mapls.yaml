name: 'publish package to Mapls npm'
on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: mapls
      - name: Read .nvmrc
        run: echo ::set-output name=NVMRC::$(cat .nvmrc)
        id: nvm
      - name: Setup node ${{ steps.nvm.outputs.NVMRC }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ steps.nvm.outputs.NVMRC }}
          package-manager-cache: false
      - name: Install dependencies
        run: yarn install --immutable
      - name: Authenticate with registry
        run: |
          NPM_TOKEN=$(curl -sf -X POST \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"cibot\",\"password\":\"${{ secrets.CI_BOT_PASSWORD }}\"}" \
            https://registry.mapls.ee/-/verdaccio/sec/login \
            | jq -r '.token')
          echo "NPM_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"
      - name: Publish to Mapls npm
        run: |
          echo "//registry.mapls.ee/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.mapls.ee" >> ~/.npmrc
          npm publish
